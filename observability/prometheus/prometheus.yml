global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: ingestion-api
    static_configs:
      - targets: ["ingestion-api:8000"]
    metrics_path: /metrics