services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: nexus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U nexus" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestion-api:
    build:
      context: ./services/ingestion-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://nexus:${POSTGRES_PASSWORD}@postgres:5432/nexus
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /tmp/nexus/uploads
    ports:
      - "8000:8000"
    volumes:
      - ./services/ingestion-api/app:/app/app
      - ./services/ingestion-api/tests:/app/tests
      - uploads:/tmp/nexus/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  processing-worker:
    build:
      context: .
      dockerfile: services/processing-worker/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://nexus:${POSTGRES_PASSWORD}@postgres:5432/nexus
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - uploads:/tmp/nexus/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: [ "CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  uploads:
  qdrant_data:
